name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore BlunderForge.sln
      - name: Build without warnings
        run: dotnet build BlunderForge.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test BlunderForge.sln --configuration Release --no-build --logger "console;verbosity=normal"
      - name: Audit NuGet dependencies
        run: dotnet list BlunderForge.sln package --vulnerable --include-transitive

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/BlunderForge.Web/ClientApp
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/BlunderForge.Web/ClientApp/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  container:
    name: Container and real Stockfish
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Run real Stockfish integration target
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          target: stockfish-integration-tests
          push: false
          cache-from: type=gha,scope=stockfish-tests
          cache-to: type=gha,mode=max,scope=stockfish-tests
      - name: Build production image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          tags: blunderforge:ci
          cache-from: type=gha,scope=stockfish-tests
          cache-to: type=gha,mode=max,scope=production
